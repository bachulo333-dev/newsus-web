<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FREE NEWS US - World-Class Breaking News & Global Narratives</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Playfair+Display:ital,wght=0,600;0,800;1,400&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
      :root {
        --font-serif-heading: 'Playfair Display', Georgia, serif;
        --font-sans: 'Inter', system-ui, sans-serif;
        --font-logo: 'Cinzel', serif;
        --color-dark: #111111;
        --color-muted: #666666;
        --color-border: #dddddd;
        --color-accent: #c00000;
      }
      
      body { font-family: var(--font-sans); line-height: 1.5; margin: 0; padding: 0; background-color: #ffffff; color: var(--color-dark); }
      a { text-decoration: none; color: inherit; cursor: pointer; }
      a:hover { color: var(--color-accent); }
      .hidden { display: none !important; }

      header { border-bottom: 1px solid var(--color-dark); padding: 15px 4%; background: #fff; text-align: center; }
      .top-meta-bar { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--color-muted); margin-bottom: 10px; font-weight: 500; }
      .logo { font-family: var(--font-logo); font-size: 48px; font-weight: 900; letter-spacing: -2px; margin: 5px 0 15px; cursor: pointer; line-height: 1; }
      
      nav { border-top: 1px solid var(--color-border); border-bottom: 4px double var(--color-dark); padding: 8px 0; }
      nav ul { list-style: none; padding: 0; margin: 0; display: flex; justify-content: center; gap: 25px; flex-wrap: wrap; }
      nav ul li a { font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
      nav ul li a.active { color: var(--color-accent); border-bottom: 2px solid var(--color-accent); }

      .search-container { max-width: 500px; margin: 20px auto 0; padding: 0 25px; display: flex; box-sizing: border-box; }
      .search-input { width: 100%; padding: 10px 15px; border: 1px solid var(--color-border); border-radius: 4px 0 0 4px; font-size: 14px; font-family: var(--font-sans); outline: none; }
      .search-input:focus { border-color: var(--color-dark); }
      .search-btn { background: var(--color-dark); color: white; border: none; padding: 0 20px; font-weight: bold; border-radius: 0 4px 4px 0; cursor: pointer; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
      .search-btn:hover { background: var(--color-accent); }

      .main-container { max-width: 1340px; margin: 25px auto; padding: 0 25px; box-sizing: border-box; }

      .homepage-layout { display: grid; grid-template-columns: 3fr 1.8fr 1.2fr; gap: 25px; padding-bottom: 30px; }
      @media (max-width: 1024px) { .homepage-layout { grid-template-columns: 1fr 1fr; } }
      @media (max-width: 768px) { .homepage-layout { grid-template-columns: 1fr; } }

      .main-hero { border-right: 1px solid var(--color-border); padding-right: 25px; }
      @media (max-width: 1024px) { .main-hero { border-right: none; padding-right: 0; grid-column: span 2; } }
      @media (max-width: 768px) { .main-hero { grid-column: span 1; } }
      .hero-img-wrapper img { width: 100%; max-height: 460px; object-fit: cover; cursor: pointer; border-radius: 2px; }
      .hero-title { font-family: var(--font-serif-heading); font-size: 38px; font-weight: 800; line-height: 1.15; margin: 15px 0 12px; letter-spacing: -0.5px; }
      .hero-excerpt { font-size: 15px; color: var(--color-muted); margin: 0 0 15px; line-height: 1.6; }

      .sub-features { border-right: 1px solid var(--color-border); padding-right: 25px; display: flex; flex-direction: column; gap: 20px; }
      @media (max-width: 1024px) { .sub-features { border-right: none; padding-right: 0; } }
      .sub-card { border-bottom: 1px solid #eee; padding-bottom: 20px; }
      .sub-card:last-child { border-bottom: none; padding-bottom: 0; }
      .sub-card-title { font-family: var(--font-serif-heading); font-size: 20px; font-weight: 700; line-height: 1.3; margin: 5px 0 8px; }
      .sub-card-excerpt { font-size: 13px; color: var(--color-muted); margin: 0; }

      .trending-panel { display: flex; flex-direction: column; gap: 15px; }
      @media (max-width: 1024px) { .trending-panel { grid-column: span 2; display: grid; grid-template-columns: 1fr 1fr 1fr; border-top: 1px solid var(--color-border); padding-top: 20px; } }
      @media (max-width: 768px) { .trending-panel { grid-column: span 1; grid-template-columns: 1fr; } }
      .panel-section-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid var(--color-dark); padding-bottom: 4px; margin-bottom: 10px; display: block; }
      .trending-row { display: flex; gap: 15px; padding-bottom: 12px; border-bottom: 1px solid #f0f0f0; align-items: flex-start; }
      .trending-num { font-family: var(--font-serif-heading); font-size: 26px; font-weight: 800; color: #ccc; line-height: 1; }
      .trending-text { font-family: var(--font-serif-heading); font-size: 14px; font-weight: 700; margin: 0; line-height: 1.3; }

      .stream-grid-block { margin-top: 20px; padding-top: 30px; border-top: 1px solid var(--color-dark); }
      .stream-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
      @media (max-width: 900px) { .stream-grid { grid-template-columns: 1fr 1fr; } }
      @media (max-width: 480px) { .stream-grid { grid-template-columns: 1fr; } }
      .grid-card img { width: 100%; height: 150px; object-fit: cover; border-radius: 2px; }
      .grid-card-title { font-family: var(--font-serif-heading); font-size: 16px; font-weight: 700; margin: 10px 0 5px; line-height: 1.3; }
      .grid-card-excerpt { font-size: 12px; color: var(--color-muted); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

      .article-view { max-width: 780px; margin: 40px auto; padding: 0 15px; overflow: hidden; }
      .article-title { font-family: var(--font-serif-heading); font-size: 44px; font-weight: 800; line-height: 1.15; margin-bottom: 15px; letter-spacing: -0.5px; }
      .article-meta { font-size: 12px; text-transform: uppercase; color: var(--color-muted); letter-spacing: 0.5px; border-bottom: 1px solid var(--color-border); padding-bottom: 15px; margin-bottom: 30px; font-weight: 600; }
      
      /* CẤU TRÚC NATIVE BANNER LỌT TRONG BÀI VIẾT */
      .in-article-ad { float: right; margin: 5px 0 20px 25px; padding: 10px; background: #fafafa; border: 1px solid #eee; border-radius: 4px; text-align: center; min-width: 300px; min-height: 250px; }
      .in-article-ad-label { display: block; font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-weight: bold; }
      @media (max-width: 768px) { .in-article-ad { float: none; margin: 20px auto; width: 100%; display: flex; flex-direction: column; align-items: center; } }

      .article-content { font-family: var(--font-sans); font-size: 18px; line-height: 1.85; color: #222; }
      .article-content p { margin-bottom: 24px; }
      .article-content img { max-width: 100%; height: auto; border-radius: 4px; }

      .tag { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--color-accent); letter-spacing: 0.5px; display: inline-block; margin-bottom: 5px; }
      footer { background-color: #fafafa; border-top: 1px solid var(--color-border); padding: 40px 20px; text-align: center; font-size: 11px; color: var(--color-muted); margin-top: 60px; letter-spacing: 0.5px; }
    </style>
  </head>
  <body>

    <header>
      <div class="top-meta-bar" id="live-date">GLOBAL NARRATIVE REPOSITORY</div>
      <div class="logo" onclick="switchCategory('ALL')">FREE NEWS US</div>
      <nav>
        <ul>
          <li><a id="menu-ALL" class="active" onclick="switchCategory('ALL')">Home</a></li>
          <li><a id="menu-WORLD" onclick="switchCategory('WORLD')">World</a></li>
          <li><a id="menu-US" onclick="switchCategory('US')">U.S.</a></li>
          <li><a id="menu-POLITICS" onclick="switchCategory('POLITICS')">Politics</a></li>
          <li><a id="menu-BUSINESS" onclick="switchCategory('BUSINESS')">Business</a></li>
          <li><a id="menu-TECHNOLOGY" onclick="switchCategory('TECHNOLOGY')">Technology</a></li>
          <li><a id="menu-SCIENCE" onclick="switchCategory('SCIENCE')">Science</a></li>
          <li><a id="menu-HEALTH" onclick="switchCategory('HEALTH')">Health</a></li>
        </ul>
      </nav>

      <div class="search-container">
        <input type="text" id="search-bar" class="search-input" placeholder="Search articles by headline..." oninput="handleSearchFilter()">
        <button class="search-btn" onclick="handleSearchFilter()">Find</button>
      </div>
    </header>

    <div class="main-container">
      
      <div id="home-view">
        <div id="magazine-layout-block">
          <div class="homepage-layout">
            <div class="main-hero" id="hero-block"></div>
            <div class="sub-features" id="sub-features-block"></div>
            <div class="trending-panel">
              <span class="panel-section-title">Trending Stories</span>
              <div id="trending-block"></div>
            </div>
          </div>
        </div>

        <div class="stream-grid-block">
          <span id="trending-title-fixed" class="panel-section-title" style="margin-bottom:20px;">More News</span>
          <div class="stream-grid" id="stream-grid-container"></div>
        </div>
      </div>

      <div id="article-view" class="article-view hidden">
        <h1 id="article-title" class="article-title"></h1>
        <div id="article-meta" class="article-meta"></div>
        <img id="article-thumb" style="width:100%; max-height:460px; object-fit:cover; margin-bottom:30px; border-radius:2px; display:none;">
        
        <div id="in-article-ad-container" class="in-article-ad">
          <span class="in-article-ad-label">Sponsored Content</span>
          <div id="adsterra-native-slot"></div>
        </div>

        <div id="article-content" class="article-content"></div>
      </div>

    </div>

    <footer>
      <p>© 2026 FREE NEWS US NETWORK. ALL RIGHTS RESERVED. HIGH-FIDELITY NEWSROOM TRANSMISSION.</p>
    </footer>

    <script>
      const SB_URL = "https://rcetkkjqllurishhgzfc.supabase.co";
      const SB_KEY = "sb_publishable_xgdxFxiJwuxLrGhBHPQItA_F5b3F6_m";
      const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

      let allPosts = [];
      let currentCategory = "ALL";
      let searchQuery = ""; 

      document.getElementById("live-date").innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

      function guessCategory(title, storedCat) {
        const cleanCat = String(storedCat || "").trim().toUpperCase();
        if (cleanCat !== "" && cleanCat !== "NEWS" && cleanCat !== "NULL" && cleanCat !== "UNDEFINED" && cleanCat !== "MORE NEWS") {
          return cleanCat;
        }
        
        const t = String(title || "").toLowerCase();
        if (t.includes("ai") || t.includes("tech") || t.includes("apple") || t.includes("google") || t.includes("software") || t.includes("algorithm")) return "TECHNOLOGY";
        if (t.includes("market") || t.includes("stock") || t.includes("gold") || t.includes("business") || t.includes("money") || t.includes("economy") || t.includes("gout") || t.includes("disease")) return "BUSINESS";
        if (t.includes("biden") || t.includes("trump") || t.includes("election") || t.includes("politics") || t.includes("government") || t.includes("riot") || t.includes("prison") || t.includes("attica")) return "POLITICS";
        if (t.includes("science") || t.includes("space") || t.includes("nasa") || t.includes("mars") || t.includes("earth") || t.includes("evolution")) return "SCIENCE";
        if (t.includes("health") || t.includes("virus") || t.includes("doctor") || t.includes("medical") || t.includes("immature")) return "HEALTH";
        if (t.includes("u.s.") || t.includes("america") || t.includes("washington") || t.includes("history") || t.includes("sniper") || t.includes("military") || t.includes("alcatraz")) return "US";
        return "WORLD"; 
      }

      function switchCategory(cat) {
        currentCategory = cat;
        searchQuery = ""; 
        document.getElementById("search-bar").value = ""; 
        
        document.querySelectorAll("nav ul li a").forEach(el => el.classList.remove("active"));
        const activeMenu = document.getElementById(`menu-${cat}`);
        if(activeMenu) activeMenu.classList.add("active");

        document.getElementById("article-view").classList.add("hidden");
        document.getElementById("home-view").classList.remove("hidden");
        window.scrollTo(0, 0);

        renderGlobalMagazineLayout();
      }

      function handleSearchFilter() {
        searchQuery = document.getElementById("search-bar").value.trim().toLowerCase();
        document.getElementById("article-view").classList.add("hidden");
        document.getElementById("home-view").classList.remove("hidden");
        renderGlobalMagazineLayout();
      }

      // HÀM BƠM MÃ NATIVE BANNER VÀO TRANG (ĐÃ FIX LỖI SPA)
      function injectNativeAd() {
        const slot = document.getElementById('adsterra-native-slot');
        if (!slot) return;
        
        // Xóa sạch quảng cáo của bài viết cũ để ép hệ thống tải quảng cáo mới
        slot.innerHTML = ''; 

        // 1. Tạo thẻ div chứa mã ID Native của ông
        const nativeDiv = document.createElement('div');
        nativeDiv.id = 'container-0c90520e910a1178a251f7cdf537edf1'; 
        slot.appendChild(nativeDiv);

        // 2. Tạo thẻ script gọi lệnh nạp ảnh từ Adsterra
        const adScript = document.createElement('script');
        adScript.async = true;
        adScript.setAttribute('data-cfasync', 'false');
        adScript.src = 'https://pl29851033.effectivecpmnetwork.com/0c90520e910a1178a251f7cdf537edf1/invoke.js'; 
        slot.appendChild(adScript);
      }

      function readArticle(id) {
        const article = allPosts.find((post) => String(post.id) === String(id));
        if (!article) return;

        // VẪN GIỮ CƠ CHẾ BẬT TAB SHOPEE ĐỂ ĂN HOA HỒNG
        let targetAffiliate = "https://s.shopee.vn/4fu2COK7Or";
        if (article.affiliate_url && article.affiliate_url.trim() !== "" && article.affiliate_url !== "https://s.shopee.vn/1gG0ShTYxL") {
            targetAffiliate = article.affiliate_url.trim();
        }
        window.open(targetAffiliate, '_blank');
        
        // Render bài viết tại trang hiện tại
        executeRenderArticleContent(id);
      }

      function executeRenderArticleContent(id) {
        const article = allPosts.find((post) => String(post.id) === String(id));
        if (!article) return;

        document.getElementById("home-view").classList.add("hidden");
        document.getElementById("article-view").classList.remove("hidden");
        window.scrollTo(0, 0);

        const newurl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?id=' + id;
        window.history.pushState({path:newurl},'',newurl);

        document.getElementById("article-title").innerText = article.title;
        document.getElementById("article-meta").innerText = `By ${article.author}  |  Published in Newsroom`;
        
        const thumbEl = document.getElementById("article-thumb");
        if (article.image_url) {
          thumbEl.src = article.image_url;
          thumbEl.style.display = "block";
        } else {
          thumbEl.style.display = "none";
        }
        document.getElementById("article-content").innerHTML = article.content;

        // BẮT ĐẦU GỌI QUẢNG CÁO NATIVE HIỂN THỊ CÙNG BÀI VIẾT
        injectNativeAd();
      }

      function extractTextFromHTML(html) {
        if (!html) return "";
        const tempDiv = document.createElement("div");
        tempDiv.innerHTML = html;
        const text = tempDiv.textContent || tempDiv.innerText || "";
        return text.length > 140 ? text.substring(0, 140) + "..." : text;
      }

      function renderGlobalMagazineLayout() {
        if(allPosts.length === 0) return;

        let filteredPosts = allPosts.filter(post => {
          if (currentCategory !== "ALL" && post.category !== currentCategory) return false;
          if (searchQuery !== "" && !post.title.toLowerCase().includes(searchQuery)) return false;
          return true;
        });

        const magazineBlock = document.getElementById("magazine-layout-block");
        const trendingTitleFixed = document.getElementById("trending-title-fixed");

        if (currentCategory === "ALL" && searchQuery === "") {
          magazineBlock.style.display = "block";
          trendingTitleFixed.style.display = "block";

          const heroPost = allPosts[0];
          const heroImg = heroPost.image_url ? `<div class="hero-img-wrapper"><img src="${heroPost.image_url}" onclick="readArticle('${heroPost.id}')"></div>` : "";
          document.getElementById("hero-block").innerHTML = `
            ${heroImg}
            <span class="tag" style="margin-top:12px;">${heroPost.category}</span>
            <h2 class="hero-title"><a onclick="readArticle('${heroPost.id}')">${heroPost.title}</a></h2>
            <p class="hero-excerpt">${heroPost.excerpt}</p>
          `;

          const subPosts = allPosts.slice(1, 4);
          let subHtml = "";
          subPosts.forEach(post => {
            subHtml += `
              <div class="sub-card">
                <span class="tag">${post.category}</span>
                <h3 class="sub-card-title"><a onclick="readArticle('${post.id}')">${post.title}</a></h3>
                <p class="sub-card-excerpt">${post.excerpt}</p>
              </div>
            `;
          });
          document.getElementById("sub-features-block").innerHTML = subHtml;

          let trendingPosts = allPosts.slice(0, 5);
          let trendHtml = "";
          trendingPosts.forEach((post, index) => {
            trendHtml += `
              <div class="trending-row">
                <div class="trending-num">0${index+1}</div>
                <div>
                  <h4 class="trending-text"><a onclick="readArticle('${post.id}')">${post.title}</a></h4>
                </div>
              </div>
            `;
          });
          document.getElementById("trending-block").innerHTML = trendHtml;

          const streamPosts = allPosts.slice(4);
          let streamHtml = "";
          const displayPosts = streamPosts.length > 0 ? streamPosts : allPosts;
          
          displayPosts.forEach(post => {
            const cardImg = post.image_url ? `<img src="${post.image_url}" onclick="readArticle('${post.id}')">` : `<div style="background:#f5f5f5;height:150px;"></div>`;
            streamHtml += `
              <div class="grid-card">
                ${cardImg}
                <h3 class="grid-card-title"><a onclick="readArticle('${post.id}')">${post.title}</a></h3>
                <p class="grid-card-excerpt">${post.excerpt}</p>
              </div>
            `;
          });
          document.getElementById("stream-grid-container").innerHTML = streamHtml;

        } else {
          magazineBlock.style.display = "none";
          trendingTitleFixed.style.display = "none";

          let streamHtml = "";
          if(filteredPosts.length === 0) {
            streamHtml = `<div style="grid-column: span 4; text-align:center; color:#888; padding: 40px 0;">No articles match your criteria.</div>`;
          } else {
            filteredPosts.forEach(post => {
              const cardImg = post.image_url ? `<img src="${post.image_url}" onclick="readArticle('${post.id}')">` : `<div style="background:#f5f5f5;height:150px;"></div>`;
              streamHtml += `
                <div class="grid-card">
                  ${cardImg}
                  <h3 class="grid-card-title"><a onclick="readArticle('${post.id}')">${post.title}</a></h3>
                  <p class="grid-card-excerpt">${post.excerpt}</p>
                </div>
              `;
            });
          }
          document.getElementById("stream-grid-container").innerHTML = streamHtml;
        }
      }

      async function loadDataFromSupabase() {
        try {
          const { data: rows, error } = await supabaseClient.from('post').select('*');
          if (error) throw error;

          if (rows && rows.length > 0) {
            allPosts = rows.map((row, index) => {
              let detectedId = String(index);
              if (row.id !== undefined && row.id !== null) detectedId = String(row.id);
              else if (row.ID !== undefined && row.ID !== null) detectedId = String(row.ID);

              const rawCat = row.category ? String(row.category) : "";
              const finalCat = guessCategory(row.title, rawCat); 

              return {
                id: detectedId, 
                title: row.title || "Untitled",
                author: row.author || "Lê Duy Bách",
                excerpt: extractTextFromHTML(row.content),
                content: row.content || "",
                image_url: row.image_url || "",
                affiliate_url: row.affiliate_url || "",
                category: finalCat 
              };
            });
            
            allPosts.reverse(); 
          }

          renderGlobalMagazineLayout();

          const urlParams = new URLSearchParams(window.location.search);
          const postId = urlParams.get('id');
          if (postId !== null) {
              executeRenderArticleContent(postId); 
          }
        } catch (err) {
          console.error("System block error:", err);
        }
      }

      loadDataFromSupabase();
    </script>

    <script type='text/javascript' src='//www.highperformanceformat.com/29/71/62/29716205.js'></script>
  </body>
</html>
