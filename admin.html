<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsroom Studio - Global Publisher Engine</title>
    
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; margin: 0; padding: 30px; }
        .admin-box { max-width: 850px; margin: 0 auto; background: white; padding: 35px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { margin-top: 0; font-weight: 700; color: #111; border-bottom: 2px solid #eee; padding-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #444; text-transform: uppercase; font-size: 12px; letter-spacing: 0.5px; }
        input[type="text"], input[type="file"], select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 15px; }
        input[type="file"] { background: #fafafa; cursor: pointer; }
        .image-preview { max-width: 100%; max-height: 200px; margin-top: 10px; border-radius: 4px; display: none; object-fit: cover; border: 1px dashed #ccc; }
        .editor-wrapper { background: #fff; border-radius: 4px; margin-bottom: 20px; }
        #editor-container { height: 400px; font-size: 16px; }
        button { background: #111; color: white; border: none; padding: 15px 25px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; width: 100%; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; }
        button:hover { background: #333; }
        button:disabled { background: #777; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="admin-box">
    <h2>Global Newsroom Editor</h2>
    
    <div class="form-group">
        <label>Headline (Tiêu đề bài viết)</label>
        <input type="text" id="post-title" placeholder="e.g., Inside the Secret Tech Race Shaping the Next Decade...">
    </div>

    <div class="form-group">
        <label>Section (Chọn phân loại danh mục cho bài viết)</label>
        <select id="post-category">
            <option value="WORLD">World</option>
            <option value="US">U.S.</option>
            <option value="POLITICS">Politics</option>
            <option value="BUSINESS">Business</option>
            <option value="TECHNOLOGY">Technology</option>
            <option value="SCIENCE">Science</option>
            <option value="HEALTH">Health</option>
        </select>
    </div>
    
    <div class="form-group">
        <label>Cover Image (Tải ảnh đại diện lên trực tiếp)</label>
        <input type="file" id="post-image-file" accept="image/*" onchange="previewAndCompressImage(this)">
        <img id="image-preview-element" class="image-preview">
    </div>

    <div class="form-group">
        <label>Target Affiliate URL (Bẫy Link tiếp thị liên kết)</label>
        <input type="text" id="post-affiliate" placeholder="https://s.shopee.vn/..." value="https://s.shopee.vn/1gG0ShTYxL">
    </div>

    <div class="form-group">
        <label>Article Content (Nội dung bài viết)</label>
        <div class="editor-wrapper">
            <div id="editor-container"></div>
        </div>
    </div>
    
    <button id="publish-btn" onclick="publishToGlobalStream()">Publish to Global Stream</button>
</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script>
    var quill = new Quill('#editor-container', {
        modules: {
            toolbar: [
                [{ 'header': [1, 2, 3, false] }],
                ['bold', 'italic', 'underline', 'strike'],
                ['blockquote', 'code-block'],
                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                ['link', 'image'],
                ['clean']
            ]
        },
        theme: 'snow'
    });

    const SB_URL = "https://rcetkkjqllurishhgzfc.supabase.co";
    const SB_KEY = "sb_publishable_xgdxFxiJwuxLrGhBHPQItA_F5b3F6_m";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let base64ImageData = "";

    // Hàm thông minh tự động nén ảnh chất lượng cao để tránh lỗi cơ sở dữ liệu
    function previewAndCompressImage(input) {
        const file = input.files[0];
        const preview = document.getElementById("image-preview-element");
        
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.src = e.target.result;
                img.onload = function() {
                    // Tạo một Canvas ngầm để xử lý nén kích thước ảnh
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    // Giới hạn chiều rộng ảnh tối đa là 800px chuẩn hiển thị báo điện tử
                    const maxW = 800;
                    const scale = maxW / img.width;
                    
                    if (img.width > maxW) {
                        canvas.width = maxW;
                        canvas.height = img.height * scale;
                    } else {
                        canvas.width = img.width;
                        canvas.height = img.height;
                    }
                    
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    // Xuất ra mã chuỗi chất lượng cao tối ưu 70% dung lượng gốc
                    base64ImageData = canvas.toDataURL('image/jpeg', 0.7);
                    preview.src = base64ImageData;
                    preview.style.display = "block";
                }
            }
            reader.readAsDataURL(file);
        } else {
            base64ImageData = "";
            preview.src = "";
            preview.style.display = "none";
        }
    }

    async function publishToGlobalStream() {
        const title = document.getElementById("post-title").value;
        const category = document.getElementById("post-category").value;
        const affiliate_url = document.getElementById("post-affiliate").value;
        const content = quill.root.innerHTML;
        const publishBtn = document.getElementById("publish-btn");

        if(!title || !content) {
            alert("Vui lòng nhập tiêu đề và nội dung bài viết!");
            return;
        }

        try {
            publishBtn.disabled = true;
            publishBtn.innerText = "Publishing... Please wait...";

            const { data, error } = await supabaseClient
                .from('post')
                .insert([
                    { 
                        title: title, 
                        image_url: base64ImageData, 
                        content: content,
                        author: "Lê Duy Bách",
                        affiliate_url: affiliate_url,
                        category: category
                    }
                ]);

            if (error) throw error;
            
            alert("Đã xuất bản thành công lên danh mục " + category + "!");
            
            document.getElementById("post-title").value = "";
            document.getElementById("post-image-file").value = "";
            document.getElementById("image-preview-element").style.display = "none";
            base64ImageData = "";
            quill.setContents([]);
        } catch (err) {
            alert("Lỗi kết nối cơ sở dữ liệu: " + err.message);
        } finally {
            publishBtn.disabled = false;
            publishBtn.innerText = "Publish to Global Stream";
        }
    }
</script>
</body>
</html>
