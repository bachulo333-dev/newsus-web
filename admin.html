<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsroom Studio - Global Publisher Engine</title>
    
    <!-- Quill Rich Text Editor Style -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; margin: 0; padding: 30px; }
        .admin-box { max-width: 850px; margin: 0 auto; background: white; padding: 35px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { margin-top: 0; font-weight: 700; color: #111; border-bottom: 2px solid #eee; padding-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #444; text-transform: uppercase; font-size: 12px; letter-spacing: 0.5px; }
        input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 15px; }
        .editor-wrapper { background: #fff; border-radius: 4px; margin-bottom: 20px; }
        #editor-container { height: 400px; font-size: 16px; }
        button { background: #111; color: white; border: none; padding: 15px 25px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; width: 100%; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; }
        button:hover { background: #333; }
    </style>
</head>
<body>

<div class="admin-box">
    <h2>Global Newsroom Editor</h2>
    
    <div class="form-group">
        <label>Headline (Tiêu đề bài viết - Giật gân, cuốn hút)</label>
        <input type="text" id="post-title" placeholder="e.g., Inside the Secret Tech Race Shaping the Next Decade...">
    </div>
    
    <div class="form-group">
        <label>Cover Image URL (Link hình ảnh đại diện hiển thị ngoài trang chủ)</label>
        <input type="text" id="post-image" placeholder="https://images.unsplash.com/... hoặc link ảnh bất kỳ">
    </div>

    <div class="form-group">
        <label>Target Affiliate URL (Bẫy Link tiếp thị liên kết riêng cho bài này)</label>
        <input type="text" id="post-affiliate" placeholder="https://s.shopee.vn/..." value="https://s.shopee.vn/1gG0ShTYxL">
    </div>

    <div class="form-group">
        <label>Article Content (Nội dung bài viết - Hỗ trợ dán văn bản từ AI, chỉnh đậm nhạt, chèn link)</label>
        <div class="editor-wrapper">
            <div id="editor-container"></div>
        </div>
    </div>
    
    <button onclick="publishToGlobalStream()">Publish to Global Stream</button>
</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script>
    var quill = new Quill('#editor-container', {
        modules: {
            toolbar: [
                [{ 'header': [1, 2, 3, false] }],
                ['bold', 'italic', 'underline', 'strike'],
                ['blockquote', 'code-block'],
                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                ['link', 'image'],
                ['clean']
            ]
        },
        theme: 'snow'
    });

    const SB_URL = "https://rcetkkjqllurishhgzfc.supabase.co";
    const SB_KEY = "sb_publishable_xgdxFxiJwuxLrGhBHPQItA_F5b3F6_m";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    async function publishToGlobalStream() {
        const title = document.getElementById("post-title").value;
        const image_url = document.getElementById("post-image").value;
        const affiliate_url = document.getElementById("post-affiliate").value;
        const content = quill.root.innerHTML;

        if(!title || !content) {
            alert("Vui lòng nhập tiêu đề và nội dung bài viết!");
            return;
        }

        try {
            const { data, error } = await supabaseClient
                .from('post')
                .insert([
                    { 
                        title: title, 
                        image_url: image_url, 
                        content: content,
                        author: "Lê Duy Bách",
                        affiliate_url: affiliate_url,
                        category: "NEWS" // Đưa về dòng chảy tin tức chung
                    }
                ]);

            if (error) throw error;
            
            alert("Đã xuất bản thành công lên dòng chảy tin tức toàn cầu!");
            document.getElementById("post-title").value = "";
            document.getElementById("post-image").value = "";
            quill.setContents([]);
        } catch (err) {
            alert("Lỗi kết nối cơ sở dữ liệu: " + err.message);
        }
    }
</script>
</body>
</html>
